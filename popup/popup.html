<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Scratch HUD Coach</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
    
    body {
      font-family: 'Outfit', ui-sans-serif, system-ui, -apple-system, sans-serif;
      width: 320px;
      padding: 16px;
      margin: 0;
      background: linear-gradient(135deg, #4f46e5 0%, #8b5cf6 50%, #d946ef 100%);
      color: #0f172a;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }
    
    .glass-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(20px) saturate(190%);
      -webkit-backdrop-filter: blur(20px) saturate(190%);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      padding: 20px 16px;
      box-shadow: 
        0 10px 30px 0 rgba(31, 38, 135, 0.2),
        inset 0 1px 1px 0 rgba(255, 255, 255, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-sizing: border-box;
      animation: cardAppear 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    
    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    
    .logo-container {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 8px 16px rgba(79, 70, 229, 0.3);
      color: white;
      font-size: 22px;
      font-weight: 800;
      animation: logoPulse 2s infinite ease-in-out;
    }
    
    @keyframes logoPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    h3 {
      margin: 0 0 6px 0;
      font-size: 17px;
      font-weight: 800;
      color: #1e1b4b;
      letter-spacing: -0.02em;
    }
    
    p {
      font-size: 12px;
      color: #475569;
      margin: 0 0 12px 0;
      line-height: 1.45;
      font-weight: 400;
    }
    
    button {
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
      color: white;
      font-weight: 600;
      font-size: 13px;
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.3);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s, filter 0.2s;
      width: 100%;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(79, 70, 229, 0.45);
      filter: brightness(1.05);
    }
    
    button:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
      filter: brightness(0.95);
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <div class="logo-container">🧩</div>
    <h3>Scratch HUD Coach</h3>
    <p>스크래치 화면 위에 코칭 보조 HUD 창을 열어 가이드를 작성하세요.</p>
    <button id="btn-toggle">🚀 HUD 토글</button>
    
    <hr style="width: 100%; border: none; border-top: 1px dashed rgba(0,0,0,0.1); margin: 16px 0;">

    <div style="width: 100%; text-align: left;">
      <h4 style="margin: 0 0 8px 0; font-size: 13px; color: #1e1b4b; display: flex; align-items: center; justify-content: space-between;">
        🤖 AI 생성 블록 주입
        <span id="inject-status-badge" style="font-size: 10px; background: #e2e8f0; color: #64748b; padding: 2px 6px; border-radius: 8px;">대기 없음</span>
      </h4>
      
      <div style="font-size: 11px; margin-bottom: 8px; color: #475569; background: rgba(255, 255, 255, 0.4); padding: 8px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.5); display: flex; flex-direction: column; gap: 4px;">
        <div style="display: flex; gap: 4px;">📍 <b style="min-width: 60px;">스프라이트:</b> <span id="detected-sprites" style="color: #4f46e5; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">대기 중...</span></div>
        <div style="display: flex; gap: 4px;">📊 <b style="min-width: 60px;">변수:</b> <span id="detected-variables" style="color: #4f46e5; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">대기 중...</span></div>
        <div style="display: flex; gap: 4px;">✉️ <b style="min-width: 60px;">방송 신호:</b> <span id="detected-broadcasts" style="color: #4f46e5; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">대기 중...</span></div>
      </div>

      <textarea id="custom-json-input" placeholder="여기에 AI가 생성한 JSON을 붙여넣으세요..." style="width: 100%; height: 80px; padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; background: rgba(255,255,255,0.9); font-size: 11px; resize: vertical; box-sizing: border-box; outline: none; margin-bottom: 8px; font-family: monospace;"></textarea>
      
      <div style="display: flex; gap: 8px; margin-bottom: 12px;">
        <button id="btn-save-custom-json" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); flex: 2; padding: 8px 12px; font-size: 12px;">💾 저장 및 대기</button>
        <button id="btn-clear-custom-json" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); flex: 1; padding: 8px 12px; font-size: 12px;">초기화</button>
      </div>

      <div class="accordion" id="accordion-guide">
        <button id="btn-toggle-guide" style="background: rgba(255,255,255,0.5); color: #334155; border: 1px solid #cbd5e1; box-shadow: none; font-size: 12px; padding: 8px; text-align: left; justify-content: space-between;">
          📋 AI 프롬프트 가이드 보기 <span id="guide-arrow">▼</span>
        </button>
        <div id="guide-content" style="display: none; margin-top: 8px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px;">
          <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px; padding-bottom:6px; border-bottom:1px dashed rgba(0,0,0,0.08);">
            <input type="checkbox" id="popup-cb-include-comments" style="cursor:pointer; width:13px; height:13px; accent-color:#6366f1;">
            <label for="popup-cb-include-comments" style="font-size:11px; color:#475569; cursor:pointer; user-select:none; line-height:1.4;">
              📝 프로젝트 내 주석(구현 지침) 포함
            </label>
          </div>
          <div id="popup-ghost-cleanup-container" style="margin-bottom:6px; display:none; align-items:center; justify-content:space-between; background:#fff1f2; border:1px solid #fecdd3; border-radius:6px; padding:6px 8px;">
            <span style="font-size:11px; color:#be123c;">
              ⚠️ 유령 주석 <strong id="popup-ghost-count">0</strong>개 감지됨
            </span>
            <button id="popup-btn-clean-ghost" style="padding:3px 8px; font-size:10px; border-radius:4px; background:#e11d48; color:white; border:none; cursor:pointer; font-weight:bold; width:auto; box-shadow:none;">
              정리하기
            </button>
          </div>
          <textarea id="ai-prompt-template" readonly style="width: 100%; height: 120px; font-size: 10px; font-family: monospace; background: transparent; border: none; outline: none; resize: none;">
[시스템 지침]
당신은 스크래치 3.0 코딩 AI 어시스턴트입니다.
사용자가 제공하는 스프라이트 시나리오에 맞게 다음 JSON 스키마를 준수하여 코드 블록을 생성하세요.

[JSON 스키마 구조 및 대표 블록 가이드]
최상위 객체의 키는 스프라이트 이름이며, 값은 스크립트 시퀀스의 2차원 배열입니다.
{
  "스프라이트이름1": [
    [
      { "opcode": "event_whenflagclicked" },
      { "opcode": "motion_movesteps", "inputs": { "STEPS": 10 } }
    ]
  ]
}

- 시작 이벤트(깃발): { "opcode": "event_whenflagclicked" }
- 키 클릭 이벤트: { "opcode": "event_whenkeypressed", "fields": { "KEY_OPTION": "space" } }
- 신호 받았을 때: { "opcode": "event_whenbroadcastreceived", "fields": { "BROADCAST_OPTION": "신호명" } }
- 신호 보내기: { "opcode": "event_broadcast", "inputs": { "BROADCAST_INPUT": { "opcode": "event_broadcast_menu", "fields": { "BROADCAST_OPTION": "신호명" } } } }
- ~초 기다리기: { "opcode": "control_wait", "inputs": { "DURATION": 1 } }
- 10번 반복하기: { "opcode": "control_repeat", "inputs": { "TIMES": 10, "SUBSTACK": [ ... ] } }
- 무한 반복하기: { "opcode": "control_forever", "inputs": { "SUBSTACK": [ ... ] } }
- 만약 ~라면: { "opcode": "control_if", "inputs": { "CONDITION": [ ... ], "SUBSTACK": [ ... ] } }
- 만약 ~라면, 아니면: { "opcode": "control_if_else", "inputs": { "CONDITION": [ ... ], "SUBSTACK": [ ... ], "SUBSTACK2": [ ... ] } }
- 변수 정하기: { "opcode": "data_setvariableto", "fields": { "VARIABLE": "변수명" }, "inputs": { "VALUE": 0 } }
- 변수 바꾸기: { "opcode": "data_changevariableby", "fields": { "VARIABLE": "변수명" }, "inputs": { "VALUE": 1 } }
- 닿았는가 감지: { "opcode": "sensing_touchingobject", "inputs": { "TOUCHINGOBJECTMENU": { "opcode": "sensing_touchingobjectmenu", "fields": { "TOUCHINGOBJECTMENU": "_mouse_" } } } }
- x, y 좌표 이동: { "opcode": "motion_gotoxy", "inputs": { "X": 0, "Y": 0 } }
- 10만큼 움직이기: { "opcode": "motion_movesteps", "inputs": { "STEPS": 10 } }
- 모양 바꾸기: { "opcode": "looks_switchcostumeto", "inputs": { "COSTUME": { "opcode": "looks_costume", "fields": { "COSTUME": "모양명" } } } }
- ~의 ~좌표/값 감지: { "opcode": "sensing_of", "fields": { "PROPERTY": "x position" }, "inputs": { "OBJECT": { "opcode": "sensing_of_object_menu", "fields": { "OBJECT": "스프라이트명" } } } }

주의:
1. Scratch 3.0 공식 opcode만 사용하세요.
2. UUID는 부여하지 마세요.
3. inputs 필드에는 수식 블록 객체 혹은 단순 원시값(숫자/문자열)을 입력해야 합니다. 대괄호 형식의 내부 VM용 원시값 배열(예: [4, 10, "1"])은 절대 사용하지 마세요.
4. 순수한 JSON 텍스트만 출력하세요.</textarea>
          <button id="btn-copy-guide" style="background: #3b82f6; padding: 6px; font-size: 11px; margin-top: 6px; box-shadow: none;">가이드 복사</button>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
